<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <defs>
    <!-- Shadows -->
    <filter id="shadow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#b0a898" flood-opacity="0.35"/>
    </filter>
    <filter id="panel-shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4a6080" flood-opacity="0.25"/>
    </filter>
    <!-- Panel glass shimmer -->
    <linearGradient id="panel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8dff5"/>
      <stop offset="40%" stop-color="#aacbe8"/>
      <stop offset="100%" stop-color="#7aafd4"/>
    </linearGradient>
    <linearGradient id="panel-sheen" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Roof faces -->
    <linearGradient id="roof-near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6cfc6"/>
      <stop offset="100%" stop-color="#bdb3a8"/>
    </linearGradient>
    <linearGradient id="roof-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9e968d"/>
      <stop offset="100%" stop-color="#8a837b"/>
    </linearGradient>
    <linearGradient id="wall-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e2da"/>
      <stop offset="100%" stop-color="#d9d2c8"/>
    </linearGradient>
    <linearGradient id="wall-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8c0b5"/>
      <stop offset="100%" stop-color="#bab2a7"/>
    </linearGradient>
    <linearGradient id="ground-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2ddd7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2ddd7" stop-opacity="0"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c0"/>
      <stop offset="60%" stop-color="#ffd84a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </radialGradient>
    <!-- Clip for near roof panels -->
    <clipPath id="clip-near-roof">
      <polygon points="140,62 220,106 220,148 140,104"/>
    </clipPath>
  </defs>

  <!-- Ground ellipse shadow -->
  <ellipse cx="140" cy="178" rx="95" ry="14" fill="url(#ground-grad)"/>

  <!-- ═══════════════ HOUSE BODY ═══════════════ -->
  <!-- Left wall (front-left face) -->
  <polygon points="60,104 140,62 140,148 60,170" fill="url(#wall-left)" filter="url(#shadow-soft)"/>
  <!-- Right wall (front-right face) -->
  <polygon points="140,148 220,106 220,160 140,170" fill="url(#wall-right)"/>
  <!-- Bottom join line -->
  <line x1="60" y1="170" x2="140" y2="170" stroke="#a09890" stroke-width="0.5" opacity="0.5"/>
  <line x1="140" y1="170" x2="220" y2="160" stroke="#a09890" stroke-width="0.5" opacity="0.5"/>

  <!-- Windows – left wall -->
  <rect x="70" y="120" width="22" height="16" rx="2" fill="#b8d4e8" opacity="0.7"/>
  <line x1="81" y1="120" x2="81" y2="136" stroke="#8ab0cc" stroke-width="0.8"/>
  <line x1="70" y1="128" x2="92" y2="128" stroke="#8ab0cc" stroke-width="0.8"/>
  <rect x="100" y="115" width="18" height="14" rx="2" fill="#b8d4e8" opacity="0.7"/>
  <line x1="109" y1="115" x2="109" y2="129" stroke="#8ab0cc" stroke-width="0.8"/>

  <!-- Door – left wall -->
  <rect x="118" y="135" width="15" height="22" rx="2" fill="#a09078" opacity="0.85"/>
  <circle cx="131" cy="147" r="1.2" fill="#d4b87a"/>

  <!-- Window – right wall -->
  <polygon points="158,118 178,112 178,126 158,130" fill="#b8d4e8" opacity="0.6"/>
  <line x1="168" y1="115" x2="168" y2="128" stroke="#8ab0cc" stroke-width="0.8"/>

  <!-- ═══════════════ ROOF STRUCTURE ═══════════════ -->
  <!-- Far slope (upper, darker) -->
  <polygon points="60,104 140,62 220,106 140,104" fill="url(#roof-far)"/>
  <!-- Near slope (lower, lighter — where panels live) -->
  <polygon points="140,104 220,106 220,148 140,148" fill="url(#roof-near)"/>

  <!-- Ridge line -->
  <line x1="60" y1="104" x2="220" y2="106" stroke="#8a837b" stroke-width="1" opacity="0.6"/>

  <!-- ═══════════════ SOLAR PANELS (near slope, 3×4 grid) ═══════════════ -->
  <!--
    Near slope runs from (140,104)→(220,106) top edge to (140,148)→(220,148) bottom edge.
    Isometric skew: each column shifts +20px right, +0.5px down; each row shifts 0x right +10.5px down.
    Panel cell w≈18, h≈10 in screen coords (skewed parallelogram).
  -->

  <!-- Row 1 -->
  <!-- Col 1 --> <polygon points="149,108 167,109 167,119 149,118" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="149,108 167,109 167,119 149,118" fill="url(#panel-sheen)"/>
  <line x1="149" y1="113.5" x2="167" y2="114" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="158" y1="108" x2="158" y2="119" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 2 --> <polygon points="170,109 188,110 188,120 170,119" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="170,109 188,110 188,120 170,119" fill="url(#panel-sheen)"/>
  <line x1="170" y1="114.5" x2="188" y2="115" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="179" y1="109" x2="179" y2="120" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 3 --> <polygon points="191,110 209,111 209,121 191,120" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="191,110 209,111 209,121 191,120" fill="url(#panel-sheen)"/>
  <line x1="191" y1="115.5" x2="209" y2="116" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="110" x2="200" y2="121" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Row 2 -->
  <!-- Col 1 --> <polygon points="149,120 167,121 167,131 149,130" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="149,120 167,121 167,131 149,130" fill="url(#panel-sheen)"/>
  <line x1="149" y1="125.5" x2="167" y2="126" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="158" y1="120" x2="158" y2="131" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 2 --> <polygon points="170,121 188,122 188,132 170,131" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="170,121 188,122 188,132 170,131" fill="url(#panel-sheen)"/>
  <line x1="170" y1="126.5" x2="188" y2="127" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="179" y1="121" x2="179" y2="132" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 3 --> <polygon points="191,122 209,123 209,133 191,132" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="191,122 209,123 209,133 191,132" fill="url(#panel-sheen)"/>
  <line x1="191" y1="127.5" x2="209" y2="128" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="122" x2="200" y2="133" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Row 3 -->
  <!-- Col 1 --> <polygon points="149,132 167,133 167,143 149,142" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="149,132 167,133 167,143 149,142" fill="url(#panel-sheen)"/>
  <line x1="149" y1="137.5" x2="167" y2="138" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="158" y1="132" x2="158" y2="143" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 2 --> <polygon points="170,133 188,134 188,144 170,143" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="170,133 188,134 188,144 170,143" fill="url(#panel-sheen)"/>
  <line x1="170" y1="138.5" x2="188" y2="139" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="179" y1="133" x2="179" y2="144" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Col 3 --> <polygon points="191,134 209,135 209,145 191,144" fill="url(#panel-grad)" filter="url(#panel-shadow)"/>
  <polygon points="191,134 209,135 209,145 191,144" fill="url(#panel-sheen)"/>
  <line x1="191" y1="139.5" x2="209" y2="140" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="134" x2="200" y2="145" stroke="#6a9fc0" stroke-width="0.5" opacity="0.6"/>

  <!-- Panel grid outline on near slope -->
  <polygon points="149,108 209,111 209,145 149,142" fill="none" stroke="#5a8fb0" stroke-width="0.8" opacity="0.4"/>

  <!-- ═══════════════ SUN ═══════════════ -->
  <circle cx="46" cy="38" r="22" fill="url(#sun-glow)"/>
  <circle cx="46" cy="38" r="13" fill="url(#sun-core)"/>
  <!-- Sun rays -->
  <g stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="46" y1="19" x2="46" y2="14"/>
    <line x1="46" y1="57" x2="46" y2="62"/>
    <line x1="27" y1="38" x2="22" y2="38"/>
    <line x1="65" y1="38" x2="70" y2="38"/>
    <line x1="33.3" y1="25.3" x2="29.8" y2="21.8"/>
    <line x1="58.7" y1="50.7" x2="62.2" y2="54.2"/>
    <line x1="58.7" y1="25.3" x2="62.2" y2="21.8"/>
    <line x1="33.3" y1="50.7" x2="29.8" y2="54.2"/>
  </g>

  <!-- ═══════════════ ENERGY DASHES (sun → panels) ═══════════════ -->
  <g stroke="#F7B500" stroke-width="1.2" stroke-linecap="round" opacity="0.55" stroke-dasharray="3 4">
    <line x1="59" y1="47" x2="100" y2="78"/>
    <line x1="62" y1="44" x2="115" y2="68"/>
    <line x1="65" y1="42" x2="130" y2="62"/>
  </g>

  <!-- ═══════════════ OUTLINE ACCENTS ═══════════════ -->
  <!-- House outline -->
  <polygon points="60,104 140,62 220,106 220,160 140,170 60,170" fill="none" stroke="#9e9690" stroke-width="0.8" opacity="0.4"/>
  <!-- Ridge -->
  <line x1="140" y1="62" x2="140" y2="148" stroke="#8a837b" stroke-width="0.8" opacity="0.5"/>
</svg>
